name: ari-e2e

services:
  app:
    image: ${ARI_IMAGE:-}
    build:
      context: ${ARI_SOURCE_DIR:-../../ari}
      dockerfile: docker/Dockerfile
    ports:
      - "${APP_PORT:-8081}:8080"
    environment:
      APP_ENV: e2e
      APP_DEBUG: "0"
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: "3306"
      DB_USER: ari_e2e
      DB_PASSWORD: e2e_password
      DB_NAME: ari_e2e
      DB_VERSION: "11.4.9-MariaDB"
      CORS_ALLOW_ORIGIN: "^https?://.*$$"
      MAILER_DSN: "smtp://mailpit:1025"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
      DEFAULT_URI: "http://localhost:${APP_PORT:-8081}"
      GOOGLE_AUTH_URL: "http://localhost:${MOCK_GOOGLE_PORT:-4020}/o/oauth2/v2/auth"
      GOOGLE_TOKEN_URL: "http://mock-google:4010/token"
      GOOGLE_PEOPLE_API_URL: "http://mock-google:4010/v1/people/me/connections"
      GOOGLE_GROUPS_API_URL: "http://mock-google:4010/v1/contactGroups"
      GOOGLE_CLIENT_ID: "e2e-google-client-id"
      GOOGLE_CLIENT_SECRET: "e2e-google-client-secret"
      GOOGLE_REDIRECT_URI: "http://localhost:${APP_PORT:-8081}/api/connect/google/check"
      GOOGLE_PEOPLE_API_BASE_URL: "http://mock-google:4010/v1/"
      TELEGRAM_BOT_SECRET: "e2e-telegram-bot-token"
      TELEGRAM_API_BASE_URL: "http://mock-telegram:4011"
      E2E_MODE: "1"
      DISABLE_CRON: "1"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  database:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: ari_e2e
      MARIADB_USER: ari_e2e
      MARIADB_PASSWORD: e2e_password
      MARIADB_ROOT_PASSWORD: e2e_root_password
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uari_e2e -pe2e_password || exit 1"]
      timeout: 5s
      retries: 5
      start_period: 30s
    tmpfs:
      - /var/lib/mysql:rw,size=256m

  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_PORT:-8026}:8025"
    environment:
      MP_MAX_MESSAGES: 100
      MP_DATABASE: /tmp/mailpit.db

  mock-google:
    build:
      context: ./mock-google
    ports:
      - "${MOCK_GOOGLE_PORT:-4020}:4010"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4010/__admin/calls"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s

  mock-telegram:
    build:
      context: ./mock-telegram
    ports:
      - "${MOCK_TELEGRAM_PORT:-4021}:4011"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4011/__admin/messages"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s
